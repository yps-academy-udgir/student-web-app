<form [formGroup]="studentRegistrationForm"class="dialog-form">
  <h2 mat-dialog-title>{{ isInEditMode ? 'Update Student' : 'Register Student' }}</h2>

  <mat-dialog-content class="dialog-content">
<mat-form-field appearance="outline" class="w-100 FormControls">
  <mat-label>First Name</mat-label>
  <input 
    appCapitalizeFirst 
    matInput 
    formControlName="firstName" 
    placeholder="Ex. John" 
    type="text" 
    (keypress)="allowOnlyLetters($event)" />
  <mat-error *ngIf="studentRegistrationForm.get('firstName')?.touched && studentRegistrationForm.get('firstName')?.hasError('required')">
    First Name is required.
  </mat-error>
  <mat-error *ngIf="studentRegistrationForm.get('firstName')?.touched && studentRegistrationForm.get('firstName')?.hasError('pattern')">
    Only letters are allowed.
  </mat-error>
</mat-form-field>

<mat-form-field appearance="outline" class="w-100 FormControls">
  <mat-label>Last Name</mat-label>
  <input 
    appCapitalizeFirst 
    matInput 
    formControlName="lastName" 
    placeholder="Ex. Doe" 
    type="text" 
    (keypress)="allowOnlyLetters($event)" />
  <mat-error *ngIf="studentRegistrationForm.get('lastName')?.touched && studentRegistrationForm.get('lastName')?.hasError('required')">
    Last Name is required.
  </mat-error>
  <mat-error *ngIf="studentRegistrationForm.get('lastName')?.touched && studentRegistrationForm.get('lastName')?.hasError('pattern')">
    Only letters are allowed.
  </mat-error>
</mat-form-field>

<!-- Mobile Number -->
<mat-form-field appearance="outline" class="w-100 FormControls">
  <mat-label>Mobile Number</mat-label>
  <input 
    type="text" 
    matInput 
    (input)="formatMobile($event)" 
    maxlength="11" 
    formControlName="mobileNumber" 
    placeholder="Ex. 1234567890" />
  <mat-error *ngIf="studentRegistrationForm.get('mobileNumber')?.touched && studentRegistrationForm.get('mobileNumber')?.hasError('required')">
    Mobile Number is required.
  </mat-error>
  <mat-error *ngIf="studentRegistrationForm.get('mobileNumber')?.touched && studentRegistrationForm.get('mobileNumber')?.hasError('pattern')">
    Mobile Number must be 10 digits.
  </mat-error>
</mat-form-field>

    
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="footer-actions">
    <button mat-button type="button" (click)="onClose()">Close</button>
    <button mat-raised-button color="primary" (click)="onStudentFormSubmit()">{{ isInEditMode ? 'Update' : 'Submit' }}</button>
  </mat-dialog-actions>
</form>
